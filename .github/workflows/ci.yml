name: CI

on: [push, pull_request]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev]"
      - name: Import smoke test
        run: python -c "from tests.test_imports import test_all_modules_import; test_all_modules_import(); print('OK')"
      - name: Pytest
        run: pytest -q
