name: Deploy SMT World dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths: ["smt_world/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: smt_world          # the static SMT World dashboard
      - id: deployment
        uses: actions/deploy-pages@v4
